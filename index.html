<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Rangi</title>

<style>
  body { 
    font-family: Arial; 
    background:#111; 
    color:#fff; 
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
  }
  .container { 
    width:400px; 
    text-align:center; 
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
  }
  .bar { width:100%; height:30px; background:#333; border-radius:10px; overflow:hidden; }
  .progress { height:100%; width:0%; background:lime; }
  .history { margin-top:15px; max-height:120px; overflow-y:auto; background:#222; padding:10px; border-radius:10px; }
  .entry { margin-bottom:8px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>
<div class="container">

  <h2 id="points">0</h2>
  <h2 id="rank"></h2>

  <div class="bar">
    <div class="progress" id="progress"></div>
  </div>

  <div id="login">
    <button onclick="login()">Zaloguj</button>
  </div>

  <div id="adminPanel" style="display:none;">
    <input type="number" id="amount" placeholder="Ile punktów">
    <br>
    <button onclick="addPoints()">Dodaj</button>
    <button onclick="removePoints()">Odejmij</button>
    <br>
    <button onclick="resetAll()">RESET</button>
  </div>

  <div class="history" id="history"></div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://wkngyhgtnevatwlrncja.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let points = 0;
let isAdmin = false;
let history = [];

const ranks = [
  {name:"Sub Human", min:0, max:49},
  {name:"Sub 1", min:50, max:99},
  {name:"Sub 2", min:100, max:149},
  {name:"Sub 3", min:150, max:199},
  {name:"Sub 4", min:200, max:249},
  {name:"Sub 5", min:250, max:399},
  {name:"LLTN", min:400, max:499},
  {name:"LMTN", min:500, max:599},
  {name:"LHTN", min:600, max:699},
  {name:"MLTN", min:700, max:799},
  {name:"MMTN", min:800, max:899},
  {name:"MHTN", min:900, max:999},
  {name:"HLTN", min:1000, max:1199},
  {name:"HMTN", min:1100, max:1299},
  {name:"HHTN", min:1300, max:1499},
  {name:"Chad Lite", min:1500, max:1799},
  {name:"Chad", min:1800, max:1999},
  {name:"True Adam", min:2000, max:Infinity}
];

async function login(){
  const email = prompt("Email");
  const password = prompt("Hasło");

  const { error } = await supabaseClient.auth.signInWithPassword({
    email, password
  });

  if(!error){
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("login").style.display = "none";
  }
}

async function loadData(){
  let { data } = await supabaseClient.from('points').select('*').limit(1);

  if(data && data.length > 0){
    points = data[0].value;
    history = data[0].history || [];
  }
}

async function saveData(){
  await supabaseClient
    .from('points')
    .update({ value: points, history: history })
    .eq('id', 1);
}

function addHistory(type, value){
  const time = new Date().toLocaleString();
  history.push({ time, type, value });
}

function renderHistory(){
  const div = document.getElementById("history");
  div.innerHTML = "";

  history.slice(-10).reverse().forEach(entry => {
    let color = entry.type === "add" ? "lime" : "red";
    let sign = entry.type === "add" ? "+" : "-";

    div.innerHTML += `<div class="entry" style="color:${color}">
      ${entry.time} ${sign}${entry.value}
    </div>`;
  });
}

function getRank(p) {
  return ranks.find(r => p >= r.min && p <= r.max);
}

function updateUI() {
  document.getElementById("points").innerText = points;
  document.getElementById("rank").innerText = getRank(points).name;

  const progress = document.getElementById("progress");
  const rank = getRank(points);
  const percent = ((points - rank.min) / (rank.max - rank.min)) * 100;
  progress.style.width = percent + "%";

  saveData();
  renderHistory();
}

function addPoints() {
  if(!isAdmin) return;
  const val = parseInt(document.getElementById("amount").value) || 0;
  points += val;
  addHistory("add", val);
  updateUI();
}

function removePoints() {
  if(!isAdmin) return;
  const val = parseInt(document.getElementById("amount").value) || 0;
  points -= val;
  if(points < 0) points = 0;
  addHistory("remove", val);
  updateUI();
}

function resetAll(){
  if(!isAdmin) return;
  points = 0;
  history = [];
  updateUI();
}

window.onload = () => {
  loadData().then(updateUI);
};
</script>

</body>
</html>
