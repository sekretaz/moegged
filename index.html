<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient("TU_URL", "TU_KEY");

let points = 0;
let isAdmin = false;
let history = [];

const ranks = [
  {name:"Sub Human", min:0, max:49},
  {name:"Sub 1", min:50, max:99},
  {name:"Sub 2", min:100, max:149},
  {name:"Sub 3", min:150, max:199},
  {name:"Sub 4", min:200, max:249},
  {name:"Sub 5", min:250, max:399},
  {name:"LLTN", min:400, max:499},
  {name:"LMTN", min:500, max:599},
  {name:"LHTN", min:600, max:699},
  {name:"MLTN", min:700, max:799},
  {name:"MMTN", min:800, max:899},
  {name:"MHTN", min:900, max:999},
  {name:"HLTN", min:1000, max:1199},
  {name:"HMTN", min:1100, max:1299},
  {name:"HHTN", min:1300, max:1499},
  {name:"Chad Lite", min:1500, max:1799},
  {name:"Chad", min:1800, max:1999},
  {name:"True Adam", min:2000, max:Infinity}
];

async function login(){
  const email = prompt("Email");
  const password = prompt("Hasło");

  const { error } = await supabaseClient.auth.signInWithPassword({
    email, password
  });

  if(!error){
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("login").style.display = "none";
  } else {
    alert("Błąd logowania");
  }
}

// 🔥 POBIERANIE
async function loadData(){
  let { data } = await supabaseClient.from('points').select('*').limit(1);

  if(data && data.length > 0){
    points = data[0].value;
    history = data[0].history || [];
  }
}

// 🔥 ZAPIS
async function saveData(){
  await supabaseClient
    .from('points')
    .update({
      value: points,
      history: history
    })
    .eq('id', 1);
}

function addHistory(type, value){
  const time = new Date().toLocaleString();
  history.push({ time, type, value });
}

function renderHistory(){
  const div = document.getElementById("history");
  div.innerHTML = "<b>Historia:</b><br>";

  history.slice(-10).reverse().forEach(entry => {
    let color = entry.type === "add" ? "lime" : "red";
    let sign = entry.type === "add" ? "+" : "-";

    div.innerHTML += `
      <div class="entry" style="color:${color}">
        ${entry.time} ${sign}${entry.value}
      </div>
    `;
  });
}

function getRank(p) {
  return ranks.find(r => p >= r.min && p <= r.max);
}

function updateUI() {
  document.getElementById("points").innerText = points;

  const rank = getRank(points);
  document.getElementById("rank").innerText = rank.name;

  const progress = document.getElementById("progress");
  const percent = ((points - rank.min) / (rank.max - rank.min)) * 100;
  progress.style.width = percent + "%";

  saveData();
  renderHistory();
}

function addPoints() {
  if(!isAdmin) return;
  const val = parseInt(document.getElementById("amount").value) || 0;
  points += val;
  addHistory("add", val);
  updateUI();
}

function removePoints() {
  if(!isAdmin) return;
  const val = parseInt(document.getElementById("amount").value) || 0;
  points -= val;
  if(points < 0) points = 0;
  addHistory("remove", val);
  updateUI();
}

function resetAll(){
  if(!isAdmin) return;
  if(confirm("Na pewno reset?")){
    points = 0;
    history = [];
    updateUI();
  }
}

// START
loadData().then(updateUI);
</script>
